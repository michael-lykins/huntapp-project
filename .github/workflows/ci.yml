name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install deps + EDOT
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install elastic-opentelemetry opentelemetry-distro
          edot-bootstrap --action=install
          opentelemetry-instrument --version
          python -c "import importlib.metadata as md; m=[d.metadata['Name'] for d in md.distributions() if d.metadata['Name'].startswith('opentelemetry-instrumentation-')]; print('instrumentations:', sorted(m)[:20])"

      - name: Syntax check
        run: python -m compileall -q backend lib

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: worker/requirements.txt

      - name: Install deps + EDOT
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install elastic-opentelemetry opentelemetry-distro
          edot-bootstrap --action=install
          opentelemetry-instrument --version

      - name: Syntax check
        run: python -m compileall -q worker/worker_app lib

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install & build
        working-directory: web
        run: |
          npm ci
          npm run build
