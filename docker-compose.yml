
services:
# ---- API service (FastAPI app) ----
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: api
    volumes:
      - ./backend:/app
      - ./lib:/app/lib
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      # ---- OpenTelemetry (send to local Collector) ----
      OTEL_LOG_LEVEL: debug
      OTEL_PYTHON_LOG_LEVEL: debug
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: otel:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"   # <— plaintext gRPC to local Collector
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.2,service.namespace=huntapp
      OTEL_SERVICE_NAME: huntapp-api
      OTEL_PYTHON_LOG_CORRELATION: "true"
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
      OTEL_TRACES_SAMPLER: parentbased_always_on

      # ---- App-specific env vars ----
      ELASTIC_SEARCH_HOST: ${ELASTIC_SEARCH_HOST}
      ELASTIC_SEARCH_API_KEY: ${ELASTIC_SEARCH_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: trailcam-images
      API_CORS_ALLOW_ORIGINS: http://localhost:3030

    depends_on:
      redis:
        condition: service_started
      otel:
        condition: service_started
    command: 
      - opentelemetry-instrument
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

# ---- Worker service (process background jobs) ----      
  worker:
    build:
      context:  .
      dockerfile: ./worker/Dockerfile
    env_file:
      - ./worker/.env.worker
    container_name: worker
    environment:
      # ---- OpenTelemetry (send to local Collector) ----
      OTEL_LOG_LEVEL: debug
      OTEL_PYTHON_LOG_LEVEL: debug
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: otel:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"   # <— plaintext gRPC to local Collector
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.2,service.namespace=huntapp
      OTEL_SERVICE_NAME: huntapp-worker
      OTEL_PYTHON_LOG_CORRELATION: "true"
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
      OTEL_TRACES_SAMPLER: parentbased_always_on

      # ---- App-specific ----
      ELASTIC_SEARCH_HOST: ${ELASTIC_SEARCH_HOST}
      ELASTIC_SEARCH_API_KEY: ${ELASTIC_SEARCH_API_KEY}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
      otel:
        condition: service_started
    command: 
      - opentelemetry-instrument
      - python
      - -m
      - worker_app.main

# ---- Frontend service (Next.js app) ----
  web:
    build: ./web
    container_name: web
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - api

# ---- Redis (for FastAPI and worker to share job queue) ----  
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# ---- OpenTelemetry Collector (gateway to Elastic) ----
  otel:
    image: otel/opentelemetry-collector:0.103.0
    container_name: otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP (optional for testing)
      - "8888:8888"   # Collector self-metrics
      - "13133:13133" # Health endpoint
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/metrics"]
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      ELASTIC_OTEL_OTLP_ENDPOINT: ${ELASTIC_OTEL_OTLP_ENDPOINT}
      ELASTIC_OTEL_API_KEY: ${ELASTIC_OTEL_API_KEY}
      ELASTIC_OTEL_SERVICE_NAME: huntapp-collector
      ELASTIC_OTEL_METRICS_INTERVAL: 60s
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.2,service.namespace=huntapp
      OTEL_LOG_LEVEL: debug
      OTEL_TRACES_SAMPLER: parentbased_always_on