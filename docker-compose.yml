services:
  # ---- API service (FastAPI app) ----
  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: api
    volumes:
      - ./backend:/app
      - ./lib:/app/lib
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      # ---- OpenTelemetry (send to local Collector) ----
      OTEL_LOG_LEVEL: debug
      OTEL_PYTHON_LOG_LEVEL: debug
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: otel:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.2,service.namespace=ridgeline
      OTEL_SERVICE_NAME: ridgeline-api
      OTEL_PYTHON_LOG_CORRELATION: "true"
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
      OTEL_TRACES_SAMPLER: parentbased_always_on

      # ---- App-specific env vars ----
      ELASTIC_SEARCH_HOST: ${ELASTIC_SEARCH_HOST}
      ELASTIC_SEARCH_API_KEY: ${ELASTIC_SEARCH_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: trailcam-images
      API_CORS_ALLOW_ORIGINS: http://localhost:3030

    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_started
      otel:
        condition: service_started
    command:
      - opentelemetry-instrument
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  # ---- Worker service (background processing) ----
  # Uses WORKER_ENTRY to choose which module to run:
  #   - vision_consumer     (new Redis listener for image analysis)  <-- default
  #   - worker_app.main     (your existing worker entrypoint)
  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: worker
    env_file:
      - ./worker/.env.worker
    environment:
      # ---- OpenAI Vision ----
      ENABLE_VISION_ANALYSIS: "true"
      VISION_ANALYSIS_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_VISION_MODEL: "gpt-4-vision-preview"
      OPENAI_TIMEOUT_SECONDS: "30"

      ANIMAL_CONFIDENCE_MIN: ".35"
      SPECIES_TOPK: "3"
      
      # ---- Select entrypoint (override in .env.worker if you want worker_app.main) ----
      WORKER_ENTRY: ${WORKER_ENTRY:-vision_consumer}

      # ---- OpenTelemetry (send to local Collector) ----
      OTEL_LOG_LEVEL: debug
      OTEL_PYTHON_LOG_LEVEL: debug
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: otel:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.2,service.namespace=ridgeline
      OTEL_SERVICE_NAME: ridgeline-worker
      OTEL_PYTHON_LOG_CORRELATION: "true"
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
      OTEL_TRACES_SAMPLER: parentbased_always_on

      # ---- App-specific ----
      ELASTIC_SEARCH_HOST: ${ELASTIC_SEARCH_HOST}
      ELASTIC_SEARCH_API_KEY: ${ELASTIC_SEARCH_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      IMAGE_UPLOADED_CHANNEL: ${IMAGE_UPLOADED_CHANNEL:-image_uploaded}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: trailcam-images
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_REGION: us-east-1
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: us-east-1

    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_started
      otel:
        condition: service_started
    command:
      - opentelemetry-instrument
      - python
      - -m
      - vision_consumer


  # ---- Frontend service (Next.js app) ----
  web:
    build: ./web
    container_name: web
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3030"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - api

  # ---- Redis (for FastAPI and worker to share job queue) ----
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- MinIO (S3-compatible object storage) ----
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: minio
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- OpenTelemetry Collector (gateway to Elastic) ----
  otel:
    image: otel/opentelemetry-collector:0.103.0
    container_name: otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP (optional for testing)
      - "8888:8888"   # Collector self-metrics
      - "13133:13133" # Health endpoint
    healthcheck:
      test: ["CMD", "/otelcol", "--version"]
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      ELASTIC_OTEL_OTLP_ENDPOINT: ${ELASTIC_OTEL_OTLP_ENDPOINT}
      ELASTIC_OTEL_API_KEY: ${ELASTIC_OTEL_API_KEY}
      ELASTIC_OTEL_SERVICE_NAME: ridgeline-collector
      ELASTIC_OTEL_METRICS_INTERVAL: 60s
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.2,service.namespace=ridgeline
      OTEL_LOG_LEVEL: debug
      OTEL_TRACES_SAMPLER: parentbased_always_on

  # ---- Sync service: 15-min smart poller + /trigger endpoint ----
  sync:
    build:
      context: .
      dockerfile: ./sync/Dockerfile
    container_name: sync
    command: ["opentelemetry-instrument", "python", "-m", "sync.poller"]
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      # ---- Tactacam credentials ----
      TACTACAM_USERNAME: ${TACTACAM_USERNAME}
      TACTACAM_PASSWORD: ${TACTACAM_PASSWORD}
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-15}
      SYNC_PORT: "8100"
      POLLER_URL: http://sync:8100

      # ---- Storage ----
      ELASTIC_SEARCH_HOST: ${ELASTIC_SEARCH_HOST}
      ELASTIC_SEARCH_API_KEY: ${ELASTIC_SEARCH_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: trailcam-images
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_REGION: us-east-1

      # ---- OpenTelemetry ----
      OTEL_SERVICE_NAME: ridgeline-sync
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: otel:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.0,service.namespace=ridgeline
      OTEL_PYTHON_LOG_CORRELATION: "true"
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
    depends_on:
      minio:
        condition: service_healthy
      otel:
        condition: service_started
    restart: unless-stopped

  # ---- Email trigger: inbound webhook → immediate sync ----
  email-trigger:
    build:
      context: .
      dockerfile: ./sync/Dockerfile
    container_name: email-trigger
    command: ["opentelemetry-instrument", "python", "-m", "sync.email_trigger"]
    ports:
      - "8101:8101"
    env_file:
      - .env
    environment:
      POLLER_URL: http://sync:8100
      EMAIL_TRIGGER_PORT: "8101"

      # ---- OpenTelemetry ----
      OTEL_SERVICE_NAME: ridgeline-email-trigger
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: otel:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,service.version=0.1.0,service.namespace=ridgeline
      OTEL_PYTHON_LOG_CORRELATION: "true"
      OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
    depends_on:
      - sync
      - otel
    restart: unless-stopped

volumes:
  minio-data: